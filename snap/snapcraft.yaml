name: wine-platform-runtime-core24
version: v1.0
summary: wine platform runtime snap it provides WINE liberies for WINE
description: |
 This snap provides a WINE runtime liberies via content sharing to be used by other snaps that are using WINE.

grade: stable
confinement: strict
platforms:
  amd64:
    build-on: amd64
    build-for: amd64
base: core24
compression: lzo
assumes:
  - snapd2.65.3

lint:
  # Snapcraft's `ldd` lint can't handle 32-bit things,
  # So just make it quiet and also make builds a surprising amount faster
  ignore:
    - library:
        - lib/i386-linux-gnu/**
        - usr/lib/i386-linux-gnu/**
        - lib32/**
        - usr/lib32/**

slots:
  wine-runtime-c24:
    interface: content
    source:
      read:
      - /

package-repositories:
  - type: apt
    url: http://archive.ubuntu.com/ubuntu
    suites: [noble]
    components: [main, multiverse, universe, restricted]
    architectures: [i386,amd64]
    key-id: F6ECB3762474EDA9D21B7022871920D1991BC93C
    key-server: keyserver.ubuntu.com

parts:

  wine-runtime:
    plugin: nil
    stage-packages:
      - libasound2t64
      - libasound2-plugins
      - libavcodec60
      - libdrm-common
      - libgphoto2-6t64
      - libgstreamer-plugins-base1.0-0
      - libgcrypt20
      - locales-all
      - libldap2
      - libncurses6
      - libopenal1
      - libpcap0.8t64
      - libpulse0
      - libudev1
      - libxext6
      - libxml2
      - libcapi20-3t64
      - libcups2t64
      - libcanberra-gtk-module
      - libdbus-1-3
      - libfontconfig1
      - libfreetype6
      - libgl1-mesa-dri
      - libglu1-mesa
      - libgnutls30t64
      - libgssapi-krb5-2
      - libodbc2
      - libosmesa6
      - libsane1
      - libsdl2-2.0-0
      - libv4l-0t64
      - libvulkan1
      - libxcomposite1
      - libxcursor1
      - libxcb-dri3-0
      - libxfixes3
      - libxi6
      - libxinerama1
      - libxrandr2
      - libxrender1
      - libxxf86vm1
      - libvkd3d1
      - ocl-icd-libopencl1
      - winbind
      - samba-libs
      - mesa-va-drivers
      - mesa-vdpau-drivers
      - mesa-vulkan-drivers
      - zlib1g
      - binutils
      - util-linux
      - p7zip-full
      - mesa-utils
      - vulkan-tools
      - libpci3
      - xdg-utils
      - xdg-user-dirs
      - fontconfig-config
      - pciutils
      - lsof
      - on amd64:
        - libasound2t64:i386
        - libasound2-plugins:i386
        - libavcodec60:i386
        - libgphoto2-6t64:i386
        - libgstreamer-plugins-base1.0-0:i386
        - libgcrypt20:i386
        - locales-all:i386
        - libldap2:i386
        - libncurses6:i386
        - libopenal1:i386
        - libpcap0.8t64:i386
        - libpulse0:i386
        - libudev1:i386
        - libxext6:i386
        - libxml2:i386
        - libcapi20-3t64:i386
        - libcups2t64:i386
        - libcanberra-gtk-module:i386
        - libdbus-1-3:i386
        - libfontconfig1:i386
        - libfreetype6:i386
        - libgl1-mesa-dri:i386
        - libglu1-mesa:i386
        - libgnutls30t64:i386
        - libgssapi-krb5-2:i386
        - libodbc2:i386
        - libosmesa6:i386
        # - libsane:i386
        - libsdl2-2.0-0:i386
        - libv4l-0t64:i386
        - libvulkan1:i386
        - libxcomposite1:i386
        - libxcursor1:i386
        - libxcb-dri3-0:i386
        - libxfixes3:i386
        - libxi6:i386
        - libxinerama1:i386
        - libxrandr2:i386
        - libxrender1:i386
        - libxxf86vm1:i386
        - mesa-va-drivers:i386
        - mesa-vdpau-drivers:i386
        - mesa-vulkan-drivers:i386
        - ocl-icd-libopencl1:i386
        # - winbind:i386
        - samba-libs:i386
        - zlib1g:i386
    build-packages:
      - execstack
    override-build: |
      craftctl default
      sed -i 's|/usr|$SNAP/wine-runtime/usr|' $CRAFT_PART_INSTALL/usr/bin/7z
      sed -i 's|/usr|$SNAP/wine-runtime/usr|' $CRAFT_PART_INSTALL/usr/bin/7za
      sed -i 's|/usr|$SNAP/wine-runtime/usr|' $CRAFT_PART_INSTALL/usr/bin/7zr
      execstack --clear-execstack $CRAFT_PART_INSTALL/usr/lib/x86_64-linux-gnu/libvkd3d-shader.so.1.0.0
      execstack --clear-execstack $CRAFT_PART_INSTALL/usr/lib/x86_64-linux-gnu/libvkd3d.so.1.2.0
      rm -rf $CRAFT_PART_INSTALL/etc/init
      rm -rf $CRAFT_PART_INSTALL/etc/init.d
      rm -rf $CRAFT_PART_INSTALL/etc/logrotate.d
      rm -rf $CRAFT_PART_INSTALL/usr/share/apps
      rm -rf $CRAFT_PART_INSTALL/usr/share/applications
      rm -rf $CRAFT_PART_INSTALL/usr/share/bug
      rm -rf $CRAFT_PART_INSTALL/usr/share/doc
      rm -rf $CRAFT_PART_INSTALL/usr/share/doc-base
      rm -rf $CRAFT_PART_INSTALL/usr/share/debhelper
      rm -rf $CRAFT_PART_INSTALL/usr/share/lintian
      rm -rf $CRAFT_PART_INSTALL/usr/share/man
      rm -rf $CRAFT_PART_INSTALL/usr/share/pixmaps
      rm -rf $CRAFT_PART_INSTALL/usr/share/pkgconfig

  wine-platform-runtime:
    plugin: nil
    organize:
      'wprfile': bin/
      'nlpfile': bin/
    build-packages:
      - libglib2.0-0t64
      - libxml2
      - libpsl5t64
    stage-packages:
      - cabextract         # winetricks
      - libgdk-pixbuf2.0-0 # yad
      - libgtk-3-0t64      # yad
      - libnotify4         # yad
      - libnotify-bin      # sommelier
      - perl-base          # winetricks
      - shared-mime-info
      - unzip              # winetricks
      - wget               # winetricks
      - x11-xserver-utils  # sommelier
      - yad                # winetricks
      - jq                 # desktop-launch
    override-build: |
      craftctl default
      touch $CRAFT_PART_INSTALL/wprfile
      touch $CRAFT_PART_INSTALL/nlpfile
      update-mime-database $CRAFT_PART_INSTALL/usr/share/mime
      rm -rf $CRAFT_PART_INSTALL/etc/init
      rm -rf $CRAFT_PART_INSTALL/etc/init.d
      rm -rf $CRAFT_PART_INSTALL/etc/logrotate.d
      rm -rf $CRAFT_PART_INSTALL/usr/bin/fc-*
      rm -rf $CRAFT_PART_INSTALL/usr/bin/gtk-*
      rm -rf $CRAFT_PART_INSTALL/usr/lib/dconf/dconf-service
      rm -rf $CRAFT_PART_INSTALL/usr/lib/glib-networking/glib-pacrunner
      rm -rf $CRAFT_PART_INSTALL/usr/share/GConf
      rm -rf $CRAFT_PART_INSTALL/usr/share/aclocal
      rm -rf $CRAFT_PART_INSTALL/usr/share/apport
      rm -rf $CRAFT_PART_INSTALL/usr/share/apps
      rm -rf $CRAFT_PART_INSTALL/usr/share/bash-completion
      rm -rf $CRAFT_PART_INSTALL/usr/share/bug
      rm -rf $CRAFT_PART_INSTALL/usr/share/debhelper
      rm -rf $CRAFT_PART_INSTALL/usr/share/doc
      rm -rf $CRAFT_PART_INSTALL/usr/share/doc-base
      rm -rf $CRAFT_PART_INSTALL/usr/share/icons/Adwaita
      rm -rf $CRAFT_PART_INSTALL/usr/share/icons/Humanity*
      rm -rf $CRAFT_PART_INSTALL/usr/share/icons/LoginIcons
      rm -rf $CRAFT_PART_INSTALL/usr/share/icons/ubuntu-mono*
      rm -rf $CRAFT_PART_INSTALL/usr/share/info
      rm -rf $CRAFT_PART_INSTALL/usr/share/kde4
      rm -rf $CRAFT_PART_INSTALL/usr/share/lintian
      rm -rf $CRAFT_PART_INSTALL/usr/share/menu
      rm -rf $CRAFT_PART_INSTALL/usr/share/man
      rm -rf $CRAFT_PART_INSTALL/usr/share/perl5
      rm -rf $CRAFT_PART_INSTALL/usr/share/pixmaps
      rm -rf $CRAFT_PART_INSTALL/usr/share/pkgconfig
    after:
      - wine-runtime

  fixup-winetricks:
    plugin: nil
    after: [wine-platform-runtime]
    organize:
      'winetricks': bin/
    override-build: |
      wget -nvc "https://raw.githubusercontent.com/Winetricks/winetricks/master/src/winetricks" -O $CRAFT_PART_INSTALL/winetricks
      chmod +x $CRAFT_PART_INSTALL/winetricks

  cleanup:
    after: [wine-runtime, fixup-winetricks]
    plugin: nil
    build-snaps:
      - mesa-2404/latest/stable
      - gnome-46-2404/latest/stable
    override-prime: |
      set -eux
      cd /snap/mesa-2404/current/usr/lib
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/lib/{} \;
      cd /snap/mesa-2404/current/drirc.d
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/share/{} \;
      cd /snap/mesa-2404/current/libdrm
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/share/{} \;
      cd /snap/mesa-2404/current/X11
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/share/{} \;
      cd /snap/mesa-2404/current/usr/share
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/share/{} \;
      cd /snap/gnome-46-2404/current/etc
      find . -type f,l -exec rm -f $CRAFT_PRIME/etc/{} \;
      cd /snap/gnome-46-2404/current/usr/bin
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/bin/{} \;
      cd /snap/gnome-46-2404/current/usr/lib
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/lib/{} \;
      cd /snap/gnome-46-2404/current/usr/libexec
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/libexec/{} \;
      cd /snap/gnome-46-2404/current/usr/share
      find . -type f,l -exec rm -f $CRAFT_PRIME/usr/share/{} \;
